<div class="flex h-screen bg-slate-900 text-white overflow-hidden">

  @if (isSidebarOpen) {
    <div 
      (click)="toggleSidebar()"
      class="fixed inset-0 z-20 bg-black/50 backdrop-blur-sm lg:hidden transition-opacity animate-fade-in">
    </div>
  }

  <aside 
    class="fixed inset-y-0 left-0 z-30 w-64 bg-slate-900 border-r border-slate-700 flex flex-col transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-auto"
    [class.translate-x-0]="isSidebarOpen"
    [class.-translate-x-full]="!isSidebarOpen">
    
    <div class="h-16 flex items-center justify-center text-2xl font-bold border-b border-slate-700">
      InvestCore
    </div>

    <nav class="flex-grow p-4">
      <ul>
        <li (click)="isSidebarOpen = false">
          <a routerLink="/dashboard" routerLinkActive="bg-slate-700" class="flex items-center p-3 rounded-lg hover:bg-slate-700 transition-colors">
            <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
            Dashboard
          </a>
        </li>
        <li class="mt-2" (click)="isSidebarOpen = false">
          <a routerLink="/listado" routerLinkActive="bg-slate-700" class="flex items-center p-3 rounded-lg hover:bg-slate-700 transition-colors">
            <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            Portafolio
          </a>
        </li>
        <li class="mt-2" (click)="isSidebarOpen = false">
          <a routerLink="/settings" routerLinkActive="bg-slate-700" class="flex items-center p-3 rounded-lg hover:bg-slate-700 transition-colors">
            <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            Configuración
          </a>
        </li>
      </ul>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0"> <header class="h-16 bg-slate-800 border-b border-slate-700 flex items-center justify-between lg:justify-end p-4">
      
      <button (click)="toggleSidebar()" class="lg:hidden text-slate-400 hover:text-white focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>

      <div class="flex items-center">
        <span class="mr-4 text-sm font-medium hidden sm:block">admin</span>
        <button (click)="logout()" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold py-2 px-4 rounded transition-colors">
          Logout
        </button>
      </div>
    </header>

    <main class="flex-1 p-4 lg:p-8 overflow-y-auto bg-slate-900 scroll-smooth">
      <router-outlet />
    </main>
  </div>
</div>
